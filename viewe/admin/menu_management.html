<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-image: url('../image/bgrestaurant.webp');" 
      class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-4">

    <div class="w-full max-w-4xl bg-white/10 backdrop-blur-sm shadow-2xl rounded-xl overflow-hidden flex flex-col h-[85vh]">
        
        <div class="bg-white/90 px-6 py-4 flex items-center border-b shrink-0">
            <button id="back-to-admin" class="text-black font-bold hover:text-orange-600 flex items-center gap-2 cursor-pointer bg-transparent border-none">
                ◀ Menu Management
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-4">
            
            <div class="bg-white rounded-lg p-4 flex items-center shadow-md">
                <img src="https://images.unsplash.com/photo-1559314809-0d155014e29e?w=200" class="w-24 h-24 object-cover rounded-md mr-6">
                <div class="flex-1">
                    <h3 class="text-2xl font-bold text-black">Pad Thai</h3>
                    <p class="text-xl text-gray-600">70B</p>
                </div>
                <div class="flex gap-2">
                    <button class="btn btn-sm bg-pink-200 hover:bg-pink-300 border-none text-black rounded-full px-6">Disable</button>
                    <button onclick="window.location.href='edit_menu.html'" class="btn btn-sm bg-sky-200 hover:bg-sky-300 border-none text-black rounded-full px-6">Edit</button>
                </div>
            </div>

            <div class="bg-white rounded-lg p-4 flex items-center shadow-md">
                <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=200" class="w-24 h-24 object-cover rounded-md mr-6">
                <div class="flex-1">
                    <h3 class="text-2xl font-bold text-black">Fried Rice</h3>
                    <p class="text-xl text-gray-600">60B</p>
                </div>
                <div class="flex gap-2">
                    <button class="btn btn-sm bg-pink-200 hover:bg-pink-300 border-none text-black rounded-full px-6">Disable</button>
                    <button class="btn btn-sm bg-sky-200 hover:bg-sky-300 border-none text-black rounded-full px-6">Edit</button>
                </div>
            </div>

            <div class="bg-white rounded-lg p-4 flex items-center shadow-md">
                <img src="https://images.unsplash.com/photo-1558855567-1a3af4b0e3dd?w=200" class="w-24 h-24 object-cover rounded-md mr-6">
                <div class="flex-1">
                    <h3 class="text-2xl font-bold text-black">Thai tea</h3>
                    <p class="text-xl text-gray-600">30B</p>
                </div>
                <div class="flex gap-2">
                    <button class="btn btn-sm bg-pink-200 hover:bg-pink-300 border-none text-black rounded-full px-6">Disable</button>
                    <button class="btn btn-sm bg-sky-200 hover:bg-sky-300 border-none text-black rounded-full px-6">Edit</button>
                </div>
            </div>

        </div>

        <div class="p-6 bg-transparent flex justify-center">
            <button class="btn bg-zinc-800 hover:bg-black text-white border-none w-full max-w-md text-xl font-bold rounded-lg h-14">
                + Add new menu
            </button>
        </div>
    </div>

    <script src="/viewe/admin/menu_management.html"></script>
</body>
</html>

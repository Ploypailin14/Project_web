<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-image: url('/public/image/BG.png');" 
      class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-4">

    <div class="w-full max-w-4xl bg-white/10 backdrop-blur-sm shadow-2xl rounded-xl overflow-hidden flex flex-col h-[85vh]">
        
        <div class="bg-white/90 px-6 py-4 flex items-center border-b shrink-0">
            <button onclick="window.location.href='/admin/page/welcome'" id="back-to-admin" class="text-black font-bold hover:text-orange-600 flex items-center gap-2 cursor-pointer bg-transparent border-none">
                ◀ Menu Management
            </button>
        </div>

        <div id="admin-menu-list" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>

        <div class="p-6 bg-transparent flex justify-center shrink-0">
            <button onclick="window.location.href='/admin/page/edit-menu'" class="btn bg-zinc-800 hover:bg-black text-white border-none w-full max-w-md text-xl font-bold rounded-lg h-14 shadow-lg transition-transform active:scale-95">
                + Add new menu
            </button>
        </div>
    </div>

    <script>
        async function loadAdminMenu() {
            try {
                // 💡 เปลี่ยนมาเรียก API ของ Admin แทน จะได้เห็นเมนูที่ถูกปิดการขายด้วย
                const res = await fetch('/admin/menus-list');
                const items = await res.json();
                const list = document.getElementById('admin-menu-list');
                
                if (items.length === 0) {
                    list.innerHTML = '<div class="bg-white rounded-lg p-8 text-center text-gray-500 font-bold shadow-md">ยังไม่มีเมนูอาหารในระบบ กรุณากดปุ่ม Add new menu</div>';
                    return;
                }
                
                list.innerHTML = items.map(item => {
                    const validImageUrl = (item.image && item.image.trim() !== '') 
                        ? item.image 
                        : 'https://placehold.co/200x200/ffedd5/ea580c?text=No+Image';

                    // 💡 ระบบเช็คสถานะ: ถ้า available ให้ปุ่มเป็นสีชมพู (ปิด) ถ้า unavailable ให้เป็นสีเขียว (เปิด)
                    const isAvailable = (item.status === 'available');
                    const btnText = isAvailable ? 'Disable' : 'Enable';
                    const btnColor = isAvailable ? 'bg-pink-200 hover:bg-pink-300' : 'bg-green-200 hover:bg-green-300';
                    const targetStatus = isAvailable ? 'unavailable' : 'available'; // สถานะที่จะส่งไปให้หลังบ้านตอนกดปุ่ม
                    
                    // ปรับสีตัวอักษรของชื่อเมนูให้สีซีดลง ถ้าถูกปิดการขาย
                    const titleColor = isAvailable ? 'text-black' : 'text-gray-400';

                    return `
                    <div class="bg-white rounded-lg p-4 flex items-center shadow-md transition hover:shadow-lg">
                        <img src="${validImageUrl}" class="w-24 h-24 object-cover rounded-md mr-6 border border-gray-100 ${!isAvailable ? 'opacity-50 grayscale' : ''}">
                        <div class="flex-1">
                            <h3 class="text-2xl font-bold ${titleColor}">${item.name} ${!isAvailable ? '<span class="text-sm text-red-500">(ปิดการขาย)</span>' : ''}</h3>
                            <p class="text-xl text-gray-600">${item.price}B</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleDisable(${item.menu_id}, '${targetStatus}')" class="btn btn-sm ${btnColor} border-none text-black rounded-full px-6 transition-all">${btnText}</button>
                            <button onclick="goToEdit(${item.menu_id})" class="btn btn-sm bg-sky-200 hover:bg-sky-300 border-none text-black rounded-full px-6">Edit</button>
                        </div>
                    </div>
                `}).join('');
                
            } catch (error) {
                console.error("Error loading admin menus:", error);
            }
        }

        // ฟังก์ชันเมื่อกดปุ่ม Disable / Enable
        function toggleDisable(menuId, newStatus) {
            const actionText = newStatus === 'unavailable' ? 'ปิดการขาย' : 'เปิดการขายกลับมา';
            
            Swal.fire({
                title: 'ยืนยัน',
                text: `คุณต้องการ${actionText}ใช่หรือไม่?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: newStatus === 'unavailable' ? '#f472b6' : '#4ade80',
                cancelButtonColor: '#9ca3af',
                confirmButtonText: `ใช่, ${actionText}`
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        // ส่งสถานะใหม่ไปอัปเดตที่หลังบ้าน
                        const response = await fetch(`/admin/menu/status/${menuId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ status: newStatus })
                        });

                        if (response.ok) {
                            // อัปเดตสำเร็จ ให้รีโหลดเมนูใหม่เพื่อเปลี่ยนสีปุ่มและข้อความ
                            loadAdminMenu(); 
                        } else {
                            Swal.fire('ผิดพลาด', 'อัปเดตสถานะไม่สำเร็จ', 'error');
                        }
                    } catch (error) {
                        console.error("Toggle error:", error);
                    }
                }
            });
        }

        function goToEdit(menuId) {
            window.location.href = `/admin/page/edit-menu?id=${menuId}`;
        }

        loadAdminMenu();
    </script>
</body>
</html>

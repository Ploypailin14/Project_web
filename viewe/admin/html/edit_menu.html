<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการข้อมูลเมนู</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-image: url('/public/image/BG.png');" 
      class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-4 font-sans text-black">

    <div class="w-full max-w-3xl bg-white shadow-2xl rounded-xl p-8">
        
        <div class="flex items-center mb-6 pb-4 border-b border-gray-100">
            <button onclick="window.location.href='/admin/page/menu'" class="text-blue-500 hover:text-blue-700 font-bold flex items-center gap-2 bg-transparent border-none text-lg cursor-pointer">
                ◀ กลับหน้าจัดการเมนู
            </button>
        </div>

        <div class="mb-6">
            <h3 class="font-bold text-gray-800 mb-3 text-lg">📸 รูปภาพเมนูอาหาร</h3>
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 flex flex-col items-center justify-center bg-gray-50 relative min-h-[250px]">
                
                <div id="preview-box" class="w-64 h-40 bg-orange-100 rounded-lg flex items-center justify-center text-orange-500 font-black text-2xl overflow-hidden shadow-sm mb-4">
                    <span id="preview-text">ตัวอย่างรูปภาพ</span>
                    <img id="preview-img" class="w-full h-full object-cover hidden" src="" alt="Menu Image">
                </div>

                <input type="file" id="imageFile" class="hidden" accept="image/*">
                <button onclick="document.getElementById('imageFile').click()" class="btn btn-sm bg-white hover:bg-gray-100 text-gray-700 border border-gray-400 font-bold px-6 rounded-lg shadow-sm">
                    อัปโหลดรูปภาพใหม่
                </button>
            </div>
        </div>

        <div class="mb-6">
            <label class="label font-bold text-gray-800 pb-2">หมวดหมู่อาหาร</label>
            <div class="flex flex-wrap gap-2" id="category-container">
                <button class="cat-btn btn btn-sm border-none bg-zinc-800 text-white rounded-lg px-6" data-cat="Main Course">อาหารจานหลัก</button>
                <button class="cat-btn btn btn-sm border-none bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg px-6" data-cat="Appetizer">ของทานเล่น</button>
                <button class="cat-btn btn btn-sm border-none bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg px-6" data-cat="Dessert">ของหวาน</button>
                <button class="cat-btn btn btn-sm border-none bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg px-6" data-cat="Beverage">เครื่องดื่ม</button>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <div class="form-control">
                <label class="label font-bold text-gray-800 pb-1">ชื่อเมนู</label>
                <input type="text" id="menuName" placeholder="เช่น ผัดกะเพราหมูสับไข่ดาว" class="input input-bordered w-full bg-gray-50 border-gray-300 text-black font-bold">
            </div>

            <div class="form-control">
                <label class="label font-bold text-gray-800 pb-1">รายละเอียดเมนู</label>
                <textarea id="menuDesc" placeholder="อธิบายส่วนผสม หรือจุดเด่นของเมนูนี้ (ถ้ามี)..." class="textarea textarea-bordered w-full bg-gray-50 border-gray-300 text-black font-bold h-24 resize-none"></textarea>
            </div>

            <div class="form-control">
                <label class="label font-bold text-gray-800 pb-1">ราคา (บาท)</label>
                <input type="number" id="menuPrice" placeholder="เช่น 50" class="input input-bordered w-full bg-gray-50 border-gray-300 text-black font-bold text-lg">
            </div>
        </div>

        <div class="flex justify-between items-center pt-6 border-t border-gray-200">
            <button onclick="window.location.href='/admin/page/menu'" class="btn btn-ghost text-gray-500 hover:text-black font-bold px-4">ยกเลิก</button>
            <button id="saveBtn" class="btn bg-green-500 hover:bg-green-600 text-white border-none px-10 rounded-lg text-lg font-bold shadow-md">บันทึกข้อมูล</button>
        </div>

    </div>

    <script src="/public/js/edit_menu.js"></script>
</body>
</html>

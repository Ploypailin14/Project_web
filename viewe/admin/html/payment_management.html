<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing & Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-b from-[#db8b22] to-[#382c21] min-h-screen p-4 md:p-8 text-black font-sans">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-2xl p-6">
        
        <div class="flex items-center gap-4 mb-6 border-b pb-4">
            <button onclick="window.location.href='/admin/page/welcome'" class="btn btn-sm bg-gray-200 hover:bg-gray-300 border-none text-gray-700 font-bold flex-shrink-0">
                ◀ กลับหน้าหลัก
            </button>
            <div>
                <h1 class="text-3xl font-black text-gray-800">💸 แคชเชียร์ & รับชำระเงิน</h1>
                <p class="text-sm text-gray-500 font-bold">จัดการบิลของโต๊ะที่ยังไม่ชำระเงิน (แก้ไขยอด/ลดราคาได้)</p>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="table w-full">
                <thead class="text-gray-600 bg-gray-100 font-bold text-sm">
                    <tr>
                        <th>เบอร์โต๊ะ</th>
                        <th>รหัสลูกค้า</th>
                        <th>สถานะลูกค้า</th>
                        <th class="text-right">ยอดรวม (฿)</th>
                        <th class="text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="payment-body"></tbody>
            </table>
        </div>
    </div>
    <script src="/public/js/payment_management.js"></script>
</body>
</html>

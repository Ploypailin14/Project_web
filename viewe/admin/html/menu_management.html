<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-image: url('/public/image/BG.png');"
    class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-4">

    <div class="w-full max-w-4xl bg-white/10 backdrop-blur-sm shadow-2xl rounded-xl overflow-hidden flex flex-col h-[85vh]">

        <div class="bg-white/90 px-6 py-4 flex items-center gap-4 border-b shrink-0">
            <button onclick="window.location.href='/admin/page/welcome'" class="btn btn-sm bg-gray-200 hover:bg-gray-300 border-none text-gray-700 font-bold flex-shrink-0">
                ◀ กลับหน้าหลัก
            </button>
            <div>
                <h1 class="text-2xl font-black text-gray-800">🍽️ จัดการเมนูอาหาร</h1>
            </div>
        </div>

        <div id="admin-menu-list" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>

        <div class="p-6 bg-transparent flex justify-center shrink-0">
            <button onclick="window.location.href='/admin/page/edit-menu'"
                class="btn bg-zinc-800 hover:bg-black text-white border-none w-full max-w-md text-xl font-bold rounded-lg h-14 shadow-lg transition-transform active:scale-95">
                + เพิ่มเมนูใหม่
            </button>
        </div>
    </div>
    <script src="/public/js/menu_management.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Stats</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div style="background-image: url('/public/image/BG.png');" 
         class="w-full max-w-3xl rounded-lg shadow-2xl overflow-hidden bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-8 relative min-h-[600px] flex flex-col">
        
        <div class="mb-2">
            <button id="back-btn" class="text-black font-bold text-lg hover:underline flex items-center gap-1 bg-transparent border-none cursor-pointer">
                ◀ Admin Dashboard
            </button>
        </div>

        <h1 class="text-4xl font-bold text-white text-center mb-6 drop-shadow-md">Dashboard</h1>

        <div class="flex flex-col gap-4 mb-10 w-full max-w-xl mx-auto">
            
            <div class="bg-white rounded-md py-3 px-4 flex flex-col items-center justify-center shadow-md">
                <div class="text-black font-bold text-md mb-1">Customer Today</div>
                <div class="text-black font-bold text-2xl flex items-center gap-2">
                    <span>👥</span> <span id="customer-count">80</span>
                </div>
            </div>

            <div class="bg-white rounded-md py-3 px-4 flex flex-col items-center justify-center shadow-md">
                <div class="text-black font-bold text-md mb-1">Revenue</div>
                <div class="text-black font-bold text-2xl flex items-center gap-2">
                    <span>💰</span> <span id="revenue-amount">15,000B</span>
                </div>
            </div>

            <div class="bg-white rounded-md py-3 px-4 flex flex-col items-center justify-center shadow-md">
                <div class="text-black font-bold text-md mb-1">Rating</div>
                <div class="text-black font-bold text-2xl flex items-center gap-2">
                    <span>📝</span> 
                    <span class="text-yellow-400 text-xl tracking-widest">
                        ★★★★<span class="text-gray-300">★</span>
                    </span>
                </div>
            </div>

        </div>

        <div class="w-full mt-auto">
            <h2 class="text-3xl font-bold text-white text-center mb-6 drop-shadow-md">Top Menu</h2>
            
            <div class="grid grid-cols-3 gap-4">
                
                <div class="bg-white rounded-lg overflow-hidden shadow-lg relative flex flex-col">
                    <div class="absolute top-2 left-2 bg-white text-black text-[10px] font-bold px-2 py-1 rounded-sm shadow-sm z-10">
                        Best Seller
                    </div>
                    <img src="https://images.unsplash.com/photo-1559314809-0d155014e29e?auto=format&fit=crop&w=300&q=80" alt="Pad Thai" class="w-full h-32 object-cover">
                    <div class="text-center text-black font-bold text-sm py-2">Pad Thai</div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-lg relative flex flex-col">
                    <div class="absolute top-2 left-2 bg-white text-black text-[10px] font-bold px-2 py-1 rounded-sm shadow-sm z-10">
                        Best Seller
                    </div>
                    <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b?auto=format&fit=crop&w=300&q=80" alt="Fried Rice" class="w-full h-32 object-cover">
                    <div class="text-center text-black font-bold text-sm py-2">Fried Rice</div>
                </div>

                <div class="bg-white rounded-lg overflow-hidden shadow-lg relative flex flex-col">
                    <div class="absolute top-2 left-2 bg-white text-black text-[10px] font-bold px-2 py-1 rounded-sm shadow-sm z-10">
                        Best Seller
                    </div>
                   <img src="https://images.unsplash.com/photo-1499638673689-79a0b5115d87?auto=format&fit=crop&w=300&q=80" alt="Thai Tea" class="w-full h-32 object-cover">
                    <div class="text-center text-black font-bold text-sm py-2">Thai Tea</div>
                </div>

            </div>
        </div>

    </div>

    <script src="/viewe/admin/js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#ff9800',
                        'brand-hover': '#f57c00',
                    }
                }
            }
        }
    </script>
</head>
<body style="background-image: url('/public/image/BG.png');" 
      class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] text-white px-4">

    <div class="w-full max-w-md p-8 text-center bg-black/40 backdrop-blur-md rounded-2xl shadow-2xl border border-white/10">
        
        <div id="login-section" class="w-full">
            <div class="text-6xl mb-4">👑</div>
            <h1 class="text-3xl font-black mb-8 drop-shadow-lg tracking-wider">RESTAURANT ADMIN</h1>
            
            <form id="login-form" class="flex flex-col gap-5">
                <div class="form-control">
                    <input type="text" id="login-username" placeholder="Username" class="input input-bordered rounded-xl w-full bg-white/90 text-black font-bold focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/50" required>
                </div>
                <div class="form-control">
                    <input type="password" id="login-password" placeholder="Password" class="input input-bordered rounded-xl w-full bg-white/90 text-black font-bold focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/50" required>
                </div>
                
                <div class="flex justify-center mt-4">
                    <button type="submit" class="btn bg-brand-orange hover:bg-brand-hover text-white border-none rounded-xl px-12 text-lg shadow-lg w-full font-bold">LOGIN</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/public/js/login.js"></script>
</body>
</html>

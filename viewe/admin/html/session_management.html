<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Session Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-b from-[#db8b22] to-[#382c21] min-h-screen p-4 md:p-8 text-black">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-2xl p-6">
        
        <div class="flex items-center gap-4 mb-6 border-b pb-4">
            <button onclick="window.location.href='/admin/page/welcome'" class="btn btn-sm bg-gray-200 hover:bg-gray-300 border-none text-gray-700 font-bold flex-shrink-0">
                ◀ กลับหน้าหลัก
            </button>
            <div>
                <h1 class="text-2xl font-black text-gray-800">👥 จัดการลูกค้า (Active Sessions)</h1>
                <p class="text-sm text-gray-500 font-bold">จัดการลูกค้าที่กำลังใช้บริการในร้าน</p>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="table w-full">
                <thead class="text-gray-600 bg-gray-100 font-bold text-sm">
                    <tr>
                        <th>รหัสลูกค้า</th>
                        <th>เบอร์โต๊ะ</th>
                        <th>เวลาเข้าร้าน</th>
                        <th>สถานะ</th>
                        <th class="text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="session-list-body"></tbody>
            </table>
        </div>
    </div>

    <dialog id="edit_session_modal" class="modal">
        <div class="modal-box bg-white">
            <h3 class="font-black text-xl mb-4 text-gray-800 border-b pb-2">อัปเดตข้อมูลลูกค้า</h3>
            <input type="hidden" id="edit-cust-id">
            
            <div class="space-y-4 mt-4">
                <div class="form-control">
                    <label class="label font-bold text-gray-700">ย้ายไปโต๊ะหมายเลข</label>
                    <input type="number" id="edit-table-id" class="input input-bordered w-full bg-gray-50 border-gray-300 text-black font-bold" placeholder="ระบุเบอร์โต๊ะใหม่">
                </div>
                
                <div class="form-control">
                    <label class="label font-bold text-gray-700">สถานะ</label>
                    <select id="edit-session-status" class="select select-bordered w-full bg-gray-50 border-gray-300 text-black font-bold">
                        <option value="active">Active (กำลังทาน)</option>
                        <option value="pending_payment">Pending Payment (รอจ่ายเงิน)</option>
                        <option value="closed">Closed (ปิดโต๊ะ/เช็คเอาท์)</option>
                    </select>
                </div>
            </div>

            <div class="modal-action mt-6">
                <button onclick="edit_session_modal.close()" class="btn btn-ghost text-gray-700">ยกเลิก</button>
                <button id="save-session-btn" class="btn bg-green-500 hover:bg-green-600 border-none text-white px-8">บันทึกข้อมูล</button>
            </div>
        </div>
    </dialog>
    <script src="/public/js/session_management.js"></script>
</body>
</html>

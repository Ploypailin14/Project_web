<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cook Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-image: url('/public/image/BG.png');"
    class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-4">

    <div class="w-full max-w-4xl bg-white/10 backdrop-blur-sm shadow-2xl rounded-xl overflow-hidden flex flex-col h-[85vh]">

        <div class="bg-white/90 px-6 py-4 flex items-center gap-4 border-b shrink-0">
            <button onclick="window.location.href='/admin/page/welcome'" class="btn btn-sm bg-gray-200 hover:bg-gray-300 border-none text-gray-700 font-bold flex-shrink-0">
                ◀ กลับหน้าหลัก
            </button>
            <div>
                <h2 class="text-2xl font-black text-gray-800">👨‍🍳 จัดการบัญชีพ่อครัว</h2>
            </div>
        </div>

        <div class="bg-white p-6 shrink-0 shadow-sm z-10 flex gap-4 items-end border-b">
            <div class="flex-1 form-control">
                <label class="label font-bold text-gray-700">กำหนด Cook ID ใหม่ให้พ่อครัว</label>
                <input type="text" id="new-cook-id" placeholder="เช่น COOK-01"
                    class="input input-bordered w-full bg-gray-50 border-gray-300 text-black font-bold" />
            </div>
            <button onclick="generateCook()" class="btn bg-orange-500 hover:bg-orange-600 border-none text-white px-8 text-lg">
                + สร้างบัญชี
            </button>
        </div>

        <div id="cook-list" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    </div>
    <script src="/public/js/cook_management.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-b from-[#db8b22] to-[#382c21] min-h-screen p-4 md:p-8 text-black">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl p-6">
        
        <div class="flex items-center gap-4 mb-6 border-b pb-4">
            <button onclick="window.location.href='/admin/page/welcome'" class="btn btn-sm bg-gray-200 hover:bg-gray-300 border-none text-gray-700 font-bold flex-shrink-0">
                ◀ กลับหน้าหลัก
            </button>
            <div>
                <h1 class="text-2xl font-black text-gray-800">🪑 จัดการโต๊ะอาหาร</h1>
            </div>
        </div>

        <div class="flex gap-2 mb-8 bg-gray-50 p-4 rounded-lg border border-gray-200 shadow-sm">
            <input type="number" id="new-table-no" placeholder="ระบุหมายเลขโต๊ะ..." class="input input-bordered w-full bg-white border-gray-300 text-black font-bold">
            <button id="add-table-btn" class="btn bg-[#db8b22] text-white border-none hover:bg-[#b06d1a] px-8">เพิ่มโต๊ะ</button>
        </div>

        <div class="overflow-x-auto">
            <table class="table w-full">
                <thead class="text-gray-600 bg-gray-100 font-bold">
                    <tr>
                        <th>ลำดับ ID</th>
                        <th>หมายเลขโต๊ะ</th>
                        <th>สถานะ</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="table-list-body"></tbody>
            </table>
        </div>
    </div>

    <dialog id="edit_table_modal" class="modal">
        <div class="modal-box bg-white">
            <h3 class="font-black text-xl mb-4 text-gray-800 border-b pb-2">แก้ไขข้อมูลโต๊ะ</h3>
            <input type="hidden" id="edit-id">
            
            <div class="flex flex-col gap-4 mt-4">
                <div class="form-control">
                    <label class="label font-bold text-gray-700">หมายเลขโต๊ะ</label>
                    <input type="number" id="edit-number" class="input input-bordered w-full bg-gray-50 border-gray-300 text-black font-bold">
                </div>
                <div class="form-control">
                    <label class="label font-bold text-gray-700">สถานะ</label>
                    <select id="edit-status" class="select select-bordered w-full bg-gray-50 border-gray-300 text-black font-bold">
                        <option value="available">Available (โต๊ะว่าง)</option>
                        <option value="occupied">Occupied (มีลูกค้า)</option>
                    </select>
                </div>
            </div>
            
            <div class="modal-action mt-6">
                <button onclick="edit_table_modal.close()" class="btn btn-ghost text-gray-700">ยกเลิก</button>
                <button id="save-edit-btn" class="btn bg-green-500 hover:bg-green-600 text-white border-none px-8">บันทึกข้อมูล</button>
            </div>
        </div>
    </dialog>
    <script src="/public/js/table_management.js"></script>
</body>
</html>

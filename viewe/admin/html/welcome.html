<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col m-0 font-sans">

    <header class="bg-white px-10 py-5 flex justify-between items-center shadow-md z-10 w-full shrink-0">
        <h1 class="text-3xl font-black text-gray-800 tracking-tight">Restaurant Management</h1>
        <div class="bg-blue-100 p-3 rounded-full text-blue-600 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
            </svg>
        </div>
    </header>

    <main style="background-image: url('/public/image/BG.png');" 
          class="flex-1 bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-8 flex flex-col items-center w-full">
        
        <div class="w-full max-w-5xl flex flex-col mt-6 flex-1">
            
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl p-6 flex items-center mb-8 shadow-xl border border-white/50">
                <div class="w-20 h-20 bg-orange-100 rounded-full mr-6 shrink-0 flex items-center justify-center text-4xl shadow-inner border-2 border-white">
                    👨‍💼
                </div>
                <div class="flex flex-col">
                    <h2 id="admin-name" class="text-3xl font-black text-gray-800 m-0 leading-tight">ADMIN NAME</h2>
                    <p id="admin-role" class="text-lg font-bold text-orange-600 m-0 mt-1">Head Restaurant Manager</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <button onclick="window.location.href='/admin/page/dashboard'" class="btn bg-white hover:bg-orange-50 text-gray-800 border-none justify-start px-8 text-xl rounded-2xl font-bold h-20 shadow-lg transition-all hover:scale-[1.02] hover:text-orange-600">
                    <span class="text-3xl mr-4">📊</span> Dashboard Stats
                </button>

                <button onclick="window.location.href='/admin/page/menu'" class="btn bg-white hover:bg-orange-50 text-gray-800 border-none justify-start px-8 text-xl rounded-2xl font-bold h-20 shadow-lg transition-all hover:scale-[1.02] hover:text-orange-600">
                    <span class="text-3xl mr-4">📋</span> Menu Management
                </button>

                <button onclick="window.location.href='/admin/page/sessions'" class="btn bg-white hover:bg-orange-50 text-gray-800 border-none justify-start px-8 text-xl rounded-2xl font-bold h-20 shadow-lg transition-all hover:scale-[1.02] hover:text-orange-600">
                    <span class="text-3xl mr-4">👥</span> Customer Sessions
                </button>

                <button onclick="window.location.href='/admin/page/tables'" class="btn bg-white hover:bg-orange-50 text-gray-800 border-none justify-start px-8 text-xl rounded-2xl font-bold h-20 shadow-lg transition-all hover:scale-[1.02] hover:text-orange-600">
                    <span class="text-3xl mr-4">🪑</span> Table Management
                </button>

                <button onclick="window.location.href='/admin/page/cook'" class="btn bg-white hover:bg-orange-50 text-gray-800 border-none justify-start px-8 text-xl rounded-2xl font-bold h-20 shadow-lg transition-all hover:scale-[1.02] hover:text-orange-600">
                    <span class="text-3xl mr-4">👨‍🍳</span> Cook Management
                </button>

                <button onclick="window.location.href='/admin/page/review'" class="btn bg-white hover:bg-orange-50 text-gray-800 border-none justify-start px-8 text-xl rounded-2xl font-bold h-20 shadow-lg transition-all hover:scale-[1.02] hover:text-orange-600">
                    <span class="text-3xl mr-4">⭐</span> Customer Reviews
                </button>

                <button onclick="window.location.href='/admin/page/manage-admins'" class="btn bg-white hover:bg-orange-50 text-gray-800 border-none justify-start px-8 text-xl rounded-2xl font-bold h-20 shadow-lg transition-all hover:scale-[1.02] hover:text-orange-600 md:col-span-2">
                    <span class="text-3xl mr-4">👑</span> Admin Staff Management
                </button>
                
            </div>

            <div class="mt-auto pt-10 pb-4 flex justify-end w-full">
                <button id="logout-btn" class="btn bg-red-500 hover:bg-red-600 text-white border-none rounded-xl px-12 text-xl font-bold shadow-xl transition-transform hover:scale-105">
                    Logout
                </button>
            </div>

        </div>
    </main>

    <script src="/public/js/welcome.js"></script>
</body>
</html>

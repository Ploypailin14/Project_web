<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-image: url('/public/image/BG.png');" 
      class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-4">

    <div class="w-full max-w-4xl bg-white shadow-2xl rounded-xl overflow-hidden flex flex-col max-h-[90vh]">
        
        <div class="bg-white px-6 py-4 flex items-center border-b shrink-0">
            <button onclick="window.location.href='/admin/page/menu'" class="text-black font-bold hover:text-orange-600 flex items-center gap-2 cursor-pointer bg-transparent border-none">
                ◀ Edit Menu
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-8 space-y-6 text-black">
            
            <section>
                <label class="block font-bold mb-2">Change Photo</label>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 flex flex-col items-center justify-center bg-gray-50">
                    <img id="preview-image" src="https://placehold.co/400x300/ffedd5/ea580c?text=Preview" class="max-w-xs h-48 w-full object-cover rounded-lg shadow-md mb-4">
                    
                    <label class="btn btn-outline btn-sm cursor-pointer">
                        Upload New Image
                        <input type="file" id="file-upload" class="hidden" accept="image/*" />
                    </label>
                </div>
            </section>

            <div class="flex gap-2" id="category-container">
                <button type="button" class="category-btn btn btn-sm bg-zinc-800 text-white hover:bg-black border-none" data-category="Main Course">Main Course</button>
                <button type="button" class="category-btn btn btn-sm btn-ghost bg-gray-100 hover:bg-gray-200" data-category="Appetizer">Appetizer</button>
                <button type="button" class="category-btn btn btn-sm btn-ghost bg-gray-100 hover:bg-gray-200" data-category="Dessert">Dessert</button>
                <button type="button" class="category-btn btn btn-sm btn-ghost bg-gray-100 hover:bg-gray-200" data-category="Beverage">Beverage</button>
            </div>

            <div class="space-y-4">
                <div class="form-control">
                    <label class="label font-bold">Menu Name</label>
                    <input type="text" id="menu-name" value="" placeholder="เช่น ผัดกะเพราหมูสับ" class="input input-bordered w-full bg-white border-gray-300" />
                </div>
                <div class="form-control">
                    <label class="label font-bold">Price</label>
                    <input type="number" id="menu-price" value="" placeholder="เช่น 50" class="input input-bordered w-full bg-white border-gray-300" />
                    <span class="text-xs text-gray-400 mt-1">Enter the price of the menu item</span>
                </div>
            </div>

            <div class="flex justify-between items-center pt-6 pb-4">
                <button onclick="window.location.href='/admin/page/menu'" class="btn btn-ghost text-lg">Cancel</button>
                <button id="save-change-btn" class="btn bg-zinc-800 hover:bg-black text-white px-12 text-lg border-none">Save Change</button>
            </div>
        </div>
    </div>

    <script>
        // ดึง ID จาก URL (เช่น ?id=2) เพื่อเช็คว่าเป็นโหมดแก้ไข หรือ โหมดสร้างใหม่
        const urlParams = new URLSearchParams(window.location.search);
        const menuId = urlParams.get('id');
        let selectedFile = null;
        let selectedCategory = "Main Course"; // 💡 ตั้งค่าเริ่มต้นเป็น Main Course

        const fileUpload = document.getElementById('file-upload');
        const previewImage = document.getElementById('preview-image');
        const categoryButtons = document.querySelectorAll('.category-btn');

        // 1. ถ้านี่คือโหมด "แก้ไข" (มี ID) ให้ไปดึงข้อมูลเดิมมาแสดง
        if (menuId) {
            // 💡 เปลี่ยนมาดึงจาก /admin/menus-list เพื่อให้แก้ไขเมนูที่โดนปิดการขาย (Disable) ได้ด้วย
            fetch('/admin/menus-list')
                .then(res => res.json())
                .then(data => {
                    const currentItem = data.find(m => m.menu_id == menuId);
                    if(currentItem) {
                        document.getElementById('menu-name').value = currentItem.name;
                        document.getElementById('menu-price').value = currentItem.price;
                        
                        // โชว์รูปเก่าถ้าระบบมีรูป
                        if (currentItem.image && currentItem.image.trim() !== '') {
                            previewImage.src = currentItem.image;
                        }

                        // 💡 อัปเดตสีปุ่มหมวดหมู่ให้ตรงกับข้อมูลใน Database
                        if (currentItem.category) {
                            selectedCategory = currentItem.category;
                            categoryButtons.forEach(btn => {
                                if (btn.getAttribute('data-category') === selectedCategory) {
                                    btn.className = "category-btn btn btn-sm bg-zinc-800 text-white hover:bg-black border-none";
                                } else {
                                    btn.className = "category-btn btn btn-sm btn-ghost bg-gray-100 hover:bg-gray-200";
                                }
                            });
                        }
                    }
                })
                .catch(err => console.error("Error loading menu details:", err));
        }

        // 2. ระบบพรีวิวรูปภาพเวลาแอดมินอัปโหลด
        fileUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                previewImage.src = URL.createObjectURL(file);
            }
        });

        // 3. ระบบคลิกสลับสีปุ่มหมวดหมู่
        categoryButtons.forEach(button => {
            button.addEventListener('click', function() {
                selectedCategory = this.getAttribute('data-category');
                
                // รีเซ็ตปุ่มอื่นให้เป็นสีเทา
                categoryButtons.forEach(btn => btn.className = "category-btn btn btn-sm btn-ghost bg-gray-100 hover:bg-gray-200");
                // เปลี่ยนปุ่มที่โดนคลิกเป็นสีดำ
                this.className = "category-btn btn btn-sm bg-zinc-800 text-white hover:bg-black border-none";
            });
        });

        // 4. ระบบบันทึกข้อมูล (ส่งรูปภาพ + ข้อความ + 💡หมวดหมู่ ไปให้หลังบ้าน)
        document.getElementById('save-change-btn').addEventListener('click', async function() {
            const menuName = document.getElementById('menu-name').value;
            const menuPrice = document.getElementById('menu-price').value;

            if (!menuName || !menuPrice) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อและราคาอาหาร', 'warning');
                return;
            }

            // ใช้ FormData เพื่อแพ็คไฟล์รูปภาพและข้อมูลส่งไปพร้อมกัน
            const formData = new FormData();
            formData.append('name', menuName);
            formData.append('price', menuPrice);
            // 💡 สำคัญ: ยัดค่าหมวดหมู่ (Category) ที่แอดมินเลือกใส่ลงไปด้วย
            formData.append('category', selectedCategory); 
            
            // ถ้ายูสเซอร์เลือกรูปใหม่ ก็ยัดไฟล์ลงกล่องไปด้วย
            if (selectedFile) {
                formData.append('imageFile', selectedFile);
            }

            try {
                let res;
                if (menuId) {
                    // โหมดแก้ไข: ใช้คำสั่ง PUT
                    res = await fetch(`/admin/menu/${menuId}`, {
                        method: 'PUT',
                        body: formData 
                    });
                } else {
                    // โหมดเพิ่มใหม่: ใช้คำสั่ง POST
                    res = await fetch('/admin/menu', {
                        method: 'POST',
                        body: formData 
                    });
                }

                if (res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'สำเร็จ!',
                        text: menuId ? 'อัปเดตเมนูเรียบร้อย' : 'เพิ่มเมนูใหม่พร้อมรูปภาพเรียบร้อย',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        window.location.href = '/admin/page/menu';
                    });
                } else {
                    const errorData = await res.json();
                    Swal.fire('ผิดพลาด', errorData.error || 'เซิร์ฟเวอร์ไม่ตอบสนอง หรือรูปแบบข้อมูลผิด', 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('เชื่อมต่อล้มเหลว', 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
            }
        });
    </script>
</body>
</html>

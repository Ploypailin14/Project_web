<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cook Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-image: url('/public/image/BG.png');" 
      class="min-h-screen flex items-center justify-center bg-cover bg-center bg-blend-overlay bg-gradient-to-b from-[#db8b22] to-[#382c21] p-4">

    <div class="w-full max-w-4xl bg-white/10 backdrop-blur-sm shadow-2xl rounded-xl overflow-hidden flex flex-col h-[85vh]">
        
        <div class="bg-white/90 px-6 py-4 flex items-center justify-between border-b shrink-0">
            <button onclick="window.location.href='/admin/page/welcome'" class="text-black font-bold hover:text-orange-600 flex items-center gap-2 cursor-pointer bg-transparent border-none">
                ◀ Back to Admin
            </button>
            <h2 class="text-xl font-bold text-gray-800">👨‍🍳 Cook Management</h2>
        </div>

        <div class="bg-white p-6 shrink-0 shadow-sm z-10 flex gap-4 items-end border-b">
            <div class="flex-1 form-control">
                <label class="label font-bold text-gray-700">กำหนด Cook ID ใหม่ให้พ่อครัว</label>
                <input type="text" id="new-cook-id" placeholder="เช่น COOK-01" class="input input-bordered w-full bg-gray-50 border-gray-300 text-black font-bold" />
            </div>
            <button onclick="generateCook()" class="btn bg-orange-500 hover:bg-orange-600 border-none text-white px-8 text-lg">
                + Generate ID
            </button>
        </div>

        <div id="cook-list" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>
    </div>

    <script>
        // โหลดรายชื่อ Cook จากฐานข้อมูล
        async function loadCooks() {
            try {
                const res = await fetch('/admin/cooks');
                const cooks = await res.json();
                const list = document.getElementById('cook-list');
                
                if (cooks.length === 0) {
                    list.innerHTML = '<div class="bg-white rounded-lg p-8 text-center text-gray-500 font-bold shadow-md">ยังไม่มีพ่อครัวในระบบ</div>';
                    return;
                }
                
                list.innerHTML = cooks.map(cook => {
                    const isActive = (cook.status === 'active');
                    
                    let statusBadge = '';
                    if (isActive) {
                        statusBadge = '<span class="badge badge-success text-white font-bold py-3">กำลังเข้ากะ (Active)</span>';
                    } else {
                        statusBadge = '<span class="badge badge-error text-white font-bold py-3">ไม่ได้เข้างาน (Inactive)</span>';
                    }

                    const btnText = isActive ? 'Disable (เลิกงาน)' : 'Active (เข้างาน)';
                    const btnColor = isActive ? 'bg-pink-200 hover:bg-pink-300' : 'bg-green-200 hover:bg-green-300';
                    
                    // 💡 แก้ไขสถานะที่จะส่งไปหลังบ้านให้เป็น inactive ให้ตรงกับ Database
                    const targetStatus = isActive ? 'inactive' : 'active';

                    return `
                    <div class="bg-white rounded-lg p-5 flex items-center justify-between shadow-md transition hover:shadow-lg">
                        <div class="flex items-center gap-5">
                            <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center text-3xl">👨‍🍳</div>
                            <div>
                                <h3 class="text-2xl font-black text-gray-800">ID: ${cook.cook_id}</h3>
                                <div class="mt-2">${statusBadge}</div>
                            </div>
                        </div>
                        <button onclick="toggleCookStatus('${cook.cook_id}', '${targetStatus}')" 
                            class="btn ${btnColor} border-none text-black rounded-xl px-6">
                            ${btnText}
                        </button>
                    </div>
                `}).join('');
                
            } catch (error) {
                console.error("Error loading cooks:", error);
            }
        }

        // แอดมินกดปุ่ม Gen Cook ID ทิ้งไว้ในระบบ
        async function generateCook() {
            const cookId = document.getElementById('new-cook-id').value;
            if (!cookId) {
                Swal.fire('แจ้งเตือน', 'กรุณากรอก Cook ID', 'warning');
                return;
            }

            try {
                const res = await fetch('/admin/cook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cook_id: cookId })
                });
                
                const data = await res.json();

                if (res.ok) {
                    Swal.fire('สำเร็จ!', `สร้างไอดี ${cookId} เรียบร้อย! ให้พ่อครัวไปลงทะเบียนตั้งรหัสผ่านได้เลยครับ`, 'success');
                    document.getElementById('new-cook-id').value = '';
                    loadCooks();
                } else {
                    Swal.fire('ผิดพลาด', data.error || 'ไม่สามารถสร้าง ID ได้ (อาจมีชื่อซ้ำแล้ว)', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'เซิร์ฟเวอร์มีปัญหา', 'error');
            }
        }

        // กดปุ่มเปลี่ยนสถานะ Disable / Active
        function toggleCookStatus(cookId, newStatus) {
            const actionText = newStatus === 'active' ? 'ให้พ่อครัวเข้าทำงาน' : 'ให้พ่อครัวเลิกงาน';
            
            Swal.fire({
                title: 'ยืนยัน',
                text: `ต้องการ${actionText} ใช่หรือไม่?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: newStatus === 'active' ? '#4ade80' : '#f472b6',
                cancelButtonColor: '#9ca3af',
                confirmButtonText: 'ใช่, ตกลง'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch(`/admin/cook/${cookId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ status: newStatus })
                        });
                        
                        // 💡 เพิ่มการแจ้งเตือนผลลัพธ์
                        if (res.ok) {
                            Swal.fire({
                                icon: 'success',
                                title: 'อัปเดตสถานะสำเร็จ',
                                showConfirmButton: false,
                                timer: 1000
                            });
                            loadCooks(); // โหลดข้อมูลใหม่เพื่อให้ปุ่มเปลี่ยนสี
                        } else {
                            const errorData = await res.json();
                            Swal.fire('ผิดพลาด', errorData.error || 'ไม่สามารถอัปเดตได้', 'error');
                        }
                    } catch (err) {
                        console.error(err);
                        Swal.fire('เชื่อมต่อล้มเหลว', 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
                    }
                }
            });
        }

        // โหลดข้อมูลตอนเปิดหน้าเว็บครั้งแรก
        loadCooks();
    </script>
</body>
</html>

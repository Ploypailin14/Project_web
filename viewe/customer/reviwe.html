<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Review</title>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl text-center">
        <h2 class="text-2xl font-bold mb-2">Rate Your Meal</h2>
        <p class="text-gray-400 mb-6">Order #<span id="orderIdLabel"></span></p>
        
        <div class="flex justify-center gap-2 mb-8" id="stars">
            <button onclick="setRate(1)" class="text-4xl text-gray-300 hover:text-yellow-400 transition">★</button>
            <button onclick="setRate(2)" class="text-4xl text-gray-300 hover:text-yellow-400 transition">★</button>
            <button onclick="setRate(3)" class="text-4xl text-gray-300 hover:text-yellow-400 transition">★</button>
            <button onclick="setRate(4)" class="text-4xl text-gray-300 hover:text-yellow-400 transition">★</button>
            <button onclick="setRate(5)" class="text-4xl text-gray-300 hover:text-yellow-400 transition">★</button>
        </div>

        <textarea id="comment" class="w-full border-2 border-gray-100 rounded-2xl p-4 focus:border-orange-400 outline-none" rows="4" placeholder="How was the taste?"></textarea>
        
        <button onclick="submitReview()" class="w-full bg-[#d48806] text-white py-4 rounded-2xl mt-6 font-bold text-lg shadow-lg">
            Submit Review
        </button>
    </div>

    <script>
        const orderId = new URLSearchParams(window.location.search).get('id');
        document.getElementById('orderIdLabel').innerText = orderId;
        let rating = 0;

        function setRate(val) {
            rating = val;
            const stars = document.querySelectorAll('#stars button');
            stars.forEach((s, i) => {
                s.classList.toggle('text-yellow-400', i < val);
                s.classList.toggle('text-gray-300', i >= val);
            });
        }

        async function submitReview() {
            if(rating === 0) return Swal.fire('กรุณาให้คะแนน', '', 'warning');
            
            const res = await fetch('/customer/review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    order_id: orderId,
                    rating: rating,
                    comment: document.getElementById('comment').value
                })
            });
            if(res.ok) {
                Swal.fire('Thank You!', 'ขอบคุณสำหรับคำติชมครับ', 'success')
                    .then(() => window.location.href = '/status');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Menu</title>
</head>
<body class="bg-gray-100 min-h-screen pb-20">
    <div class="bg-[#d48806] p-4 sticky top-0 z-10 shadow-md flex justify-between items-center text-white">
        <h2 class="font-bold">Menu List</h2>
        <div class="font-bold">Table | <span id="displayTable">0</span></div>
    </div>

    <div id="menuList" class="p-4 space-y-4 max-w-2xl mx-auto">
        </div>

    <div class="fixed bottom-0 w-full bg-white p-4 shadow-[0_-2px_10px_rgba(0,0,0,0.1)] flex justify-around">
        <button onclick="window.location.href='/menu'" class="text-orange-500 font-bold">Menu</button>
        <button onclick="window.location.href='/status'" class="text-gray-400 font-bold">Status</button>
    </div>

    <script>
        const sessionId = localStorage.getItem('sessionId');
        document.getElementById('displayTable').innerText = localStorage.getItem('tableNumber');

        async function loadMenu() {
            const res = await fetch('/customer/menu');
            const items = await res.json();
            const list = document.getElementById('menuList');
            list.innerHTML = items.map(item => `
                <div class="bg-white rounded-2xl p-4 flex shadow-sm border border-gray-100">
                    <img src="https://via.placeholder.com/100" class="w-24 h-24 rounded-xl object-cover border-2 border-orange-400 p-1">
                    <div class="ml-4 flex-1">
                        <h3 class="text-lg font-bold">${item.name}</h3>
                        <p class="text-gray-500 text-sm">${item.description || ''}</p>
                        <div class="flex justify-between items-end mt-2">
                            <span class="text-xl font-bold">${item.price}฿</span>
                            <button onclick="placeOrder(${item.menu_id})" class="bg-orange-500 text-white px-6 py-1 rounded-lg font-bold shadow-md active:scale-95">+ Add</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function placeOrder(menuId) {
            const { value: detail } = await Swal.fire({
                title: 'รายละเอียดเพิ่มเติม',
                input: 'text',
                inputPlaceholder: 'เช่น เผ็ดน้อย, ไม่ใส่ผัก...',
                showCancelButton: true
            });

            if (detail !== undefined) {
                const orderData = {
                    session_id: sessionId,
                    items: [{
                        menu_id: menuId,
                        quantity: 1,
                        detail: detail,
                        extra: 'Normal',
                        extra_price: 0
                    }]
                };

                const res = await fetch('/customer/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if(res.ok) {
                    Swal.fire('สั่งอาหารสำเร็จ!', '', 'success');
                }
            }
        }
        loadMenu();
    </script>
</body>
</html>

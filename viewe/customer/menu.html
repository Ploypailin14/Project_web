<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Menu List</title>
    <style>
        /* ซ่อน Scrollbar ของแถบหมวดหมู่ แต่ยังให้เลื่อนซ้ายขวาได้ */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans">
    
    <div class="sticky top-0 z-50 shadow-lg">
        <div class="bg-[#d48806] p-5 flex justify-between items-center text-white">
            <h2 class="text-xl font-bold">Menu List</h2>
            <div class="bg-white/20 px-4 py-1 rounded-full backdrop-blur-sm font-bold shadow-sm">
                Table | <span id="displayTable">0</span>
            </div>
        </div>

        <div class="bg-[#f39c12] px-4 py-3 overflow-x-auto whitespace-nowrap flex gap-3 hide-scrollbar">
            <button onclick="filterCategory('All', this)" class="cat-btn bg-white text-[#d48806] font-bold px-6 py-2 rounded-full shadow-sm transition-all duration-200">All</button>
            
            <button onclick="filterCategory('Main Course', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Main Course</button>
            
            <button onclick="filterCategory('Appetizer', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Appetizer</button>
            
            <button onclick="filterCategory('Dessert', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Dessert</button>
            
            <button onclick="filterCategory('Beverage', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Beverage</button>
        </div>
    </div>

    <div id="menuList" class="p-4 space-y-5 max-w-2xl mx-auto mt-2">
        </div>

    <div class="fixed bottom-0 w-full bg-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] flex justify-around rounded-t-[2rem] z-50">
        <button onclick="location.href='/menu'" class="flex flex-col items-center text-orange-500 font-bold">
            <span class="text-2xl">🍴</span><span class="text-xs">Menu</span>
        </button>
        <button onclick="location.href='/cart'" class="flex flex-col items-center text-gray-400 font-bold hover:text-orange-500 transition">
            <span class="text-2xl">🛒</span><span class="text-xs">Cart</span>
        </button>
        <button onclick="location.href='/status'" class="flex flex-col items-center text-gray-400 font-bold hover:text-orange-500 transition">
            <span class="text-2xl">📋</span><span class="text-xs">Status</span>
        </button>
    </div>

    <script>
        // โชว์เลขโต๊ะ
        document.getElementById('displayTable').innerText = localStorage.getItem('tableNumber') || '?';

        let allMenuItems = []; // 💡 ตัวแปรเก็บเมนูทั้งหมด

        // 1. โหลดข้อมูลเมนูทั้งหมดจากฐานข้อมูล (ทำแค่ครั้งแรกตอนเปิดหน้า)
        async function loadMenu() {
            try {
                const res = await fetch('/customer/menu');
                allMenuItems = await res.json();
                
                // สั่งวาดเมนู "ทั้งหมด" (All) ลงบนจอ
                renderMenu('All');
            } catch (error) {
                console.error("Error loading menus:", error);
                document.getElementById('menuList').innerHTML = '<p class="text-center text-red-500 font-bold mt-10">เกิดข้อผิดพลาดในการโหลดเมนู</p>';
            }
        }

        // 2. ฟังก์ชันสำหรับวาดเมนูลงบนจอ (ตามหมวดหมู่ที่เลือก)
        function renderMenu(categoryToFilter) {
            const list = document.getElementById('menuList');
            
            // 💡 กรองข้อมูล: ถ้าเลือก 'All' เอาทั้งหมด ถ้าเลือกหมวดอื่นก็คัดมาเฉพาะหมวดนั้น
            const filteredItems = (categoryToFilter === 'All') 
                ? allMenuItems 
                : allMenuItems.filter(item => item.category === categoryToFilter);

            // ถ้าหมวดนั้นไม่มีอาหารเลย
            if (filteredItems.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center mt-16 opacity-50">
                        <span class="text-6xl mb-4">🍽️</span>
                        <p class="text-center text-gray-500 font-bold text-lg">ยังไม่มีเมนูในหมวดหมู่นี้</p>
                    </div>`;
                return;
            }
            
            // ถ้ามีอาหาร ก็วนลูปสร้าง HTML ปกติ
            list.innerHTML = filteredItems.map(item => {
                const validImageUrl = (item.image && item.image.trim() !== '') 
                ? item.image 
                : 'https://placehold.co/400x400/ffedd5/ea580c?text=No+Image';

                // เพิ่มการแสดงชื่อหมวดหมู่ไว้ใต้ชื่ออาหารนิดนึง (จะได้รู้ว่าดึงมาถูก)
                const categoryText = item.category || 'Main Course';

                return `
                <div class="bg-white rounded-[2rem] p-4 flex shadow-md border border-gray-50 items-center transform transition duration-300 hover:scale-[1.02]">
                    <img src="${validImageUrl}" 
                        class="w-28 h-28 rounded-[1.5rem] object-cover border-4 border-orange-50 shadow-inner shrink-0">
                    <div class="ml-5 flex-1">
                        <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        <p class="text-gray-400 text-xs font-semibold mt-1 bg-gray-100 inline-block px-2 py-0.5 rounded-md">${categoryText}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-2xl font-black text-[#d48806]">${item.price}฿</span>
                            
                            <button onclick="addToCart(${item.menu_id}, '${item.name}', ${item.price})" 
                                class="bg-[#f39c12] hover:bg-orange-600 text-white px-6 py-2 rounded-xl font-bold shadow-md active:scale-90 transition-all">
                                + Add
                            </button>
                            
                        </div>
                    </div>
                </div>
                `}).join('');
        }

        // 3. ฟังก์ชันเมื่อลูกค้ากดปุ่มหมวดหมู่ด้านบน
        function filterCategory(category, btnElement) {
            // 3.1 รีเซ็ตสีปุ่มทุกอันให้กลับไปเป็นแบบ "โปร่งใส (ไม่ได้เลือก)"
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                btn.className = "cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200";
            });

            // 3.2 เปลี่ยนสีปุ่มที่ลูกค้าเพิ่งกด ให้กลายเป็นสีขาว (เพื่อแสดงว่าเลือกอยู่)
            btnElement.className = "cat-btn bg-white text-[#d48806] font-bold px-6 py-2 rounded-full shadow-sm transition-all duration-200";

            // 3.3 สั่งวาดเมนูใหม่ตามหมวดที่เลือก
            renderMenu(category);
        }

        // 4. ฟังก์ชันใส่ตะกร้า (เหมือนเดิม)
        function addToCart(id, name, price) {
            Swal.fire({
                title: name,
                input: 'text',
                inputPlaceholder: 'รายละเอียดเพิ่มเติม (เช่น เผ็ดน้อย)',
                showCancelButton: true,
                confirmButtonColor: '#f39c12',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Add to Cart',
                cancelButtonText: 'Cancel',
                customClass: { popup: 'rounded-3xl' } // ทำให้ Popup มนๆ สวยขึ้น
            }).then(result => {
                if(result.isConfirmed) {
                    let cart = JSON.parse(localStorage.getItem('cart')) || [];
                    cart.push({ menu_id: id, name: name, price: price, quantity: 1, detail: result.value || '-' });
                    localStorage.setItem('cart', JSON.stringify(cart));
                    Swal.fire({ icon: 'success', title: 'Added!', showConfirmButton: false, timer: 800, customClass: { popup: 'rounded-3xl' } });
                }
            });
        }
        
        // เริ่มโหลดเมนูทันทีที่เปิดหน้า
        loadMenu();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Menu List</title>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans">
    
    <div class="bg-[#d48806] p-5 sticky top-0 z-50 shadow-lg flex justify-between items-center text-white">
        <h2 class="text-xl font-bold">Menu List</h2>
        <div class="bg-white/20 px-4 py-1 rounded-full backdrop-blur-sm font-bold">
            Table | <span id="displayTable">0</span>
        </div>
    </div>

    <div id="menuList" class="p-4 space-y-5 max-w-2xl mx-auto">
        </div>

    <div class="fixed bottom-0 w-full bg-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] flex justify-around rounded-t-[2rem]">
        <button onclick="location.href='/menu'" class="flex flex-col items-center text-orange-500 font-bold">
            <span class="text-2xl">🍴</span><span class="text-xs">Menu</span>
        </button>
        <button onclick="location.href='/cart'" class="flex flex-col items-center text-gray-400 font-bold hover:text-orange-500 transition">
            <span class="text-2xl">🛒</span><span class="text-xs">Cart</span>
        </button>
        <button onclick="location.href='/status'" class="flex flex-col items-center text-gray-400 font-bold hover:text-orange-500 transition">
            <span class="text-2xl">📋</span><span class="text-xs">Status</span>
        </button>
    </div>

    <script>
        // โชว์เลขโต๊ะ
        document.getElementById('displayTable').innerText = localStorage.getItem('tableNumber') || '?';

        // โหลดข้อมูลเมนูจากฐานข้อมูล
        async function loadMenu() {
            try {
                const res = await fetch('/customer/menu');
                const items = await res.json();
                const list = document.getElementById('menuList');
                
                if (items.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-500 font-bold mt-10">ยังไม่มีเมนูอาหารในระบบ</p>';
                    return;
                }
                
                list.innerHTML = items.map(item => {
                    // 💡 แก้ไขปัญหารูปแตก: ถ้าไม่มี url รูป ให้ใช้รูป Placeholder สีส้มแทน
                    const validImageUrl = (item.image && item.image.trim() !== '') 
                    ? item.image 
                    : 'https://placehold.co/400x400/ffedd5/ea580c?text=No+Image';

                    return `
                    <div class="bg-white rounded-[2rem] p-4 flex shadow-md border border-gray-50 items-center">
                        <img src="${validImageUrl}" 
                            class="w-28 h-28 rounded-[1.5rem] object-cover border-4 border-orange-50 shadow-inner">
                        <div class="ml-5 flex-1">
                            <h3 class="text-xl font-bold text-gray-800">${item.name}</h3>
                            <p class="text-gray-400 text-sm line-clamp-1">${item.description || 'อร่อย สดใหม่ ทำตามสั่ง'}</p>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-2xl font-black text-[#d48806]">${item.price}฿</span>
                                
                                <button onclick="addToCart(${item.menu_id}, '${item.name}', ${item.price})" 
                                    class="bg-[#f39c12] hover:bg-orange-600 text-white px-6 py-2 rounded-xl font-bold shadow-md active:scale-90 transition-all">
                                    + Add
                                </button>
                                
                            </div>
                        </div>
                    </div>
                `}).join('');
            } catch (error) {
                console.error("Error loading menus:", error);
            }
        }

        // ฟังก์ชันใส่ตะกร้า
        function addToCart(id, name, price) {
            Swal.fire({
                title: name,
                input: 'text',
                inputPlaceholder: 'รายละเอียดเพิ่มเติม (เช่น เผ็ดน้อย)',
                showCancelButton: true,
                confirmButtonColor: '#f39c12',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Add to Cart',
                cancelButtonText: 'Cancel'
            }).then(result => {
                if(result.isConfirmed) {
                    let cart = JSON.parse(localStorage.getItem('cart')) || [];
                    cart.push({ menu_id: id, name: name, price: price, quantity: 1, detail: result.value || '-' });
                    localStorage.setItem('cart', JSON.stringify(cart));
                    Swal.fire({ icon: 'success', title: 'Added!', showConfirmButton: false, timer: 800 });
                }
            });
        }
        
        loadMenu();
    </script>
</body>
</html>

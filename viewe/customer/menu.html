<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Menu List</title>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .swal-extra-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            padding: 12px;
            background: #fff8eb;
            border-radius: 15px;
            border: 1px dashed #f39c12;
            cursor: pointer;
            transition: all 0.2s;
        }
        .swal-extra-checkbox:hover { background: #ffefd5; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans text-black">
    
    <div class="sticky top-0 z-50 shadow-lg">
        <div class="bg-[#d48806] p-5 flex justify-between items-center text-white">
            <h2 class="text-xl font-bold">Menu List</h2>
            <div class="bg-white/20 px-4 py-1 rounded-full backdrop-blur-sm font-bold shadow-sm">
                Table | <span id="displayTable">0</span>
            </div>
        </div>

        <div class="bg-[#f39c12] px-4 py-3 overflow-x-auto whitespace-nowrap flex gap-3 hide-scrollbar">
            <button onclick="filterCategory('All', this)" class="cat-btn bg-white text-[#d48806] font-bold px-6 py-2 rounded-full shadow-sm transition-all duration-200">All</button>
            <button onclick="filterCategory('Main Course', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Main Course</button>
            <button onclick="filterCategory('Appetizer', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Appetizer</button>
            <button onclick="filterCategory('Dessert', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Dessert</button>
            <button onclick="filterCategory('Beverage', this)" class="cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200">Beverage</button>
        </div>
    </div>

    <div id="menuList" class="p-4 space-y-5 max-w-2xl mx-auto mt-2"></div>

    <div class="fixed bottom-0 w-full bg-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] flex justify-around rounded-t-[2rem] z-50">
        <button onclick="location.href='/menu'" class="flex flex-col items-center text-orange-500 font-bold">
            <span class="text-2xl">🍴</span><span class="text-xs">Menu</span>
        </button>
        <button onclick="location.href='/cart'" class="flex flex-col items-center text-gray-400 font-bold hover:text-orange-500 transition">
            <span class="text-2xl">🛒</span><span class="text-xs">Cart</span>
        </button>
        <button onclick="location.href='/status'" class="flex flex-col items-center text-gray-400 font-bold hover:text-orange-500 transition">
            <span class="text-2xl">📋</span><span class="text-xs">Status</span>
        </button>
    </div>

    <script>
        document.getElementById('displayTable').innerText = localStorage.getItem('tableNumber') || '?';
        let allMenuItems = [];

        async function loadMenu() {
            try {
                const res = await fetch('/customer/menu');
                allMenuItems = await res.json();
                renderMenu('All');
            } catch (error) {
                console.error("Error loading menus:", error);
                document.getElementById('menuList').innerHTML = '<p class="text-center text-red-500 font-bold mt-10">เกิดข้อผิดพลาดในการโหลดเมนู</p>';
            }
        }

        function renderMenu(categoryToFilter) {
            const list = document.getElementById('menuList');
            const filteredItems = (categoryToFilter === 'All') 
                ? allMenuItems 
                : allMenuItems.filter(item => item.category === categoryToFilter);

            if (filteredItems.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center mt-16 opacity-50"><span class="text-6xl mb-4">🍽️</span><p class="text-gray-500 font-bold">ยังไม่มีเมนูในหมวดนี้</p></div>`;
                return;
            }
            
            list.innerHTML = filteredItems.map(item => {
                const validImageUrl = (item.image && item.image.trim() !== '') ? item.image : 'https://placehold.co/400x400/ffedd5/ea580c?text=No+Image';
                return `
                <div class="bg-white rounded-[2rem] p-4 flex shadow-md border border-gray-50 items-center transform transition duration-300 hover:scale-[1.02]">
                    <img src="${validImageUrl}" class="w-28 h-28 rounded-[1.5rem] object-cover border-4 border-orange-50 shadow-inner shrink-0">
                    <div class="ml-5 flex-1">
                        <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        <p class="text-gray-400 text-xs font-semibold mt-1 bg-gray-100 inline-block px-2 py-0.5 rounded-md">${item.category}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-2xl font-black text-[#d48806]">${item.price}฿</span>
                            <button onclick="openOrderModal(${item.menu_id}, '${item.name}', ${item.price}, '${item.category}')" class="bg-[#f39c12] hover:bg-orange-600 text-white px-6 py-2 rounded-xl font-bold shadow-md active:scale-90 transition-all">+ Add</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function filterCategory(category, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn bg-white/20 text-white hover:bg-white/40 font-bold px-6 py-2 rounded-full transition-all duration-200";
            });
            btnElement.className = "cat-btn bg-white text-[#d48806] font-bold px-6 py-2 rounded-full shadow-sm transition-all duration-200";
            renderMenu(category);
        }

        function openOrderModal(id, name, price, category) {
            const isExcluded = (category === 'Beverage' || category === 'Dessert');

            let extraSectionHtml = '';
            if (!isExcluded) {
                extraSectionHtml = `
                    <label for="swal-extra" class="swal-extra-checkbox">
                        <input type="checkbox" id="swal-extra" class="w-5 h-5 accent-orange-500">
                        <span class="font-bold text-gray-700">สั่งพิเศษ (+15 บาท)</span>
                    </label>
                `;
            }

            Swal.fire({
                title: `<span class="text-2xl font-black">${name}</span>`,
                html: `
                    <input id="swal-detail" class="swal2-input !mt-2 !mx-0 w-full rounded-xl text-base" placeholder="รายละเอียดเพิ่มเติม (เช่น เผ็ดน้อย / หวานน้อย)">
                    ${extraSectionHtml}
                `,
                showCancelButton: true,
                confirmButtonColor: '#f39c12',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Add to Cart',
                cancelButtonText: 'Cancel',
                customClass: { popup: 'rounded-[2rem]' },
                preConfirm: () => {
                    const extraCheckbox = document.getElementById('swal-extra');
                    return {
                        detail: document.getElementById('swal-detail').value || '-',
                        isExtra: extraCheckbox ? extraCheckbox.checked : false
                    }
                }
            }).then(result => {
                if(result.isConfirmed) {
                    addToCart(id, name, price, result.value.detail, result.value.isExtra);
                }
            });
        }

        function addToCart(id, name, basePrice, detail, isExtra) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const extraText = isExtra ? 'พิเศษ' : '';
            const extraPrice = isExtra ? 15 : 0;

            cart.push({ 
                menu_id: id, 
                name: name, 
                price: basePrice, 
                quantity: 1, 
                detail: detail,
                extra: extraText,
                extra_price: extraPrice
            });

            localStorage.setItem('cart', JSON.stringify(cart));
            
            Swal.fire({ 
                icon: 'success', 
                title: 'เพิ่มลงตะกร้าแล้ว!', 
                showConfirmButton: false, 
                timer: 800, 
                customClass: { popup: 'rounded-[2rem]' } 
            });
        }
        
        loadMenu();

        // 💡 ระบบเช็คสถานะโต๊ะอัตโนมัติ
        function checkSessionStatus() {
            const custId = localStorage.getItem('customerId');
            if (!custId) return;

            fetch(`/customer/check-session/${custId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'closed' || data.status === 'not_found') {
                        localStorage.removeItem('customerId');
                        localStorage.removeItem('cart'); 
                        Swal.fire({
                            icon: 'warning',
                            title: 'หมดเวลาใช้งาน',
                            text: 'เซสชันของคุณถูกปิด หรือคุณได้ชำระเงินเรียบร้อยแล้ว ขอบคุณที่ใช้บริการครับ 🙏',
                            confirmButtonColor: '#ea580c',
                            confirmButtonText: 'กลับหน้าแรก',
                            allowOutsideClick: false, 
                            allowEscapeKey: false
                        }).then(() => window.location.href = '/');
                    }
                })
                .catch(err => console.error("Session check error:", err));
        }

        setInterval(checkSessionStatus, 3000);
        checkSessionStatus();
    </script>
</body>
</html>

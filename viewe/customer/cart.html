<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>My Cart</title>
</head>
<body class="bg-gray-100 pb-32">
    
    <div class="bg-orange-600 p-4 text-white font-bold flex items-center relative shadow-md z-10">
        <button onclick="window.location.href='/menu'" class="absolute left-4 flex items-center gap-1 hover:text-gray-200 transition active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            กลับ
        </button>
        <h1 class="w-full text-center text-xl tracking-wide">ตะกร้าสินค้า</h1>
    </div>

    <div id="cartItems" class="p-4 space-y-4"></div>

    <div class="fixed bottom-0 w-full bg-white p-6 shadow-2xl rounded-t-3xl">
        <div class="flex justify-between mb-4 text-xl font-bold">
            <span>รวมทั้งหมด:</span>
            <span id="totalPrice" class="text-orange-600 font-black">0฿</span>
        </div>
        <button onclick="confirmOrder()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg transition-colors active:scale-[0.98]">ยืนยันสั่งอาหาร</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        function renderCart() {
            let total = 0;
            
            if (cart.length === 0) {
                document.getElementById('cartItems').innerHTML = '<div class="text-center text-gray-400 mt-10 font-bold">ไม่มีสินค้าในตะกร้า</div>';
                document.getElementById('totalPrice').innerText = '0฿';
                return;
            }

            document.getElementById('cartItems').innerHTML = cart.map((item, index) => {
                const itemPrice = Number(item.price || 0);
                const extraPrice = Number(item.extra_price || 0);
                const combinedPrice = itemPrice + extraPrice;
                
                total += combinedPrice * item.quantity;

                let extraTag = '';
                if (item.extra && item.extra.trim() !== '') {
                    extraTag = `<span class="text-orange-500 font-bold ml-1">(+${extraPrice}฿)</span>`;
                }

                return `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <div>
                        <h3 class="font-bold text-gray-800">${item.name} ${extraTag}</h3>
                        <p class="text-xs text-gray-400 mt-1">Note: ${item.detail}</p>
                        <p class="text-orange-500 font-bold mt-1">${combinedPrice}฿</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty(${index}, -1)" class="w-8 h-8 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-full transition-colors">-</button>
                        <span class="font-bold text-lg w-4 text-center">${item.quantity}</span>
                        <button onclick="updateQty(${index}, 1)" class="w-8 h-8 bg-orange-100 hover:bg-orange-200 text-orange-600 font-bold rounded-full transition-colors">+</button>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('totalPrice').innerText = total + '฿';
        }

        async function confirmOrder() {
            if(cart.length === 0) return Swal.fire('ตะกร้าว่างเปล่า', '', 'info');
            
            const customerId = localStorage.getItem('customerId');
            
            if(!customerId) {
                return Swal.fire('ไม่พบข้อมูลโต๊ะ', 'กรุณากลับไปหน้าแรกเพื่อสแกน/เลือกโต๊ะใหม่', 'warning')
                    .then(() => location.href = '/');
            }
            
            try {
                const res = await fetch('/customer/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: customerId, items: cart })
                });
                
                if(res.ok) {
                    localStorage.removeItem('cart');
                    Swal.fire({
                        title: 'สั่งสำเร็จ!',
                        text: 'ออเดอร์ถูกส่งเข้าครัวแล้ว',
                        icon: 'success',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => location.href = '/status');
                } else {
                    const errData = await res.json();
                    console.error("Backend Error:", errData);
                    Swal.fire('ผิดพลาด', 'เซิร์ฟเวอร์แจ้งว่า: ' + (errData.error || 'ไม่สามารถสั่งอาหารได้'), 'error');
                }
            } catch (e) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        }

        function updateQty(i, d) {
            cart[i].quantity += d;
            if(cart[i].quantity <= 0) cart.splice(i, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }
        
        renderCart();

        // 💡 ระบบเช็คสถานะโต๊ะอัตโนมัติ
        function checkSessionStatus() {
            const custId = localStorage.getItem('customerId');
            if (!custId) return;

            fetch(`/customer/check-session/${custId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'closed' || data.status === 'not_found') {
                        localStorage.removeItem('customerId');
                        localStorage.removeItem('cart'); 
                        Swal.fire({
                            icon: 'warning',
                            title: 'หมดเวลาใช้งาน',
                            text: 'เซสชันของคุณถูกปิด หรือคุณได้ชำระเงินเรียบร้อยแล้ว ขอบคุณที่ใช้บริการครับ 🙏',
                            confirmButtonColor: '#ea580c',
                            confirmButtonText: 'กลับหน้าแรก',
                            allowOutsideClick: false, 
                            allowEscapeKey: false
                        }).then(() => window.location.href = '/');
                    }
                })
                .catch(err => console.error("Session check error:", err));
        }

        setInterval(checkSessionStatus, 3000);
        checkSessionStatus();
    </script>
</body>
</html>

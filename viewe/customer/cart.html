<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>My Cart</title>
</head>
<body class="bg-gray-100 pb-32">
    <div class="bg-orange-600 p-4 text-white font-bold">ตะกร้าสินค้า</div>
    <div id="cartItems" class="p-4 space-y-4"></div>

    <div class="fixed bottom-0 w-full bg-white p-6 shadow-2xl rounded-t-3xl">
        <div class="flex justify-between mb-4 text-xl font-bold">
            <span>รวมทั้งหมด:</span>
            <span id="totalPrice" class="text-orange-600">0฿</span>
        </div>
        <button onclick="confirmOrder()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">ยืนยันสั่งอาหาร</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        function renderCart() {
            let total = 0;
            document.getElementById('cartItems').innerHTML = cart.map((item, index) => {
                total += item.price * item.quantity;
                return `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <div>
                        <h3 class="font-bold">${item.name}</h3>
                        <p class="text-xs text-gray-400">${item.detail}</p>
                        <p class="text-orange-500">${item.price}฿</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty(${index}, -1)" class="w-8 h-8 bg-gray-200 rounded-full">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQty(${index}, 1)" class="w-8 h-8 bg-gray-200 rounded-full">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = total + '฿';
        }

        async function confirmOrder() {
            if(cart.length === 0) return Swal.fire('ตะกร้าว่างเปล่า', '', 'info');
            const res = await fetch('/customer/menu', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: localStorage.getItem('sessionId'), items: cart })
            });
            if(res.ok) {
                localStorage.removeItem('cart');
                Swal.fire('สั่งสำเร็จ!', 'ออเดอร์ถูกส่งเข้าครัวแล้ว', 'success').then(() => location.href = '/status');
            }
        }

        function updateQty(i, d) {
            cart[i].quantity += d;
            if(cart[i].quantity <= 0) cart.splice(i, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }
        renderCart();
    </script>
</body>
</html>

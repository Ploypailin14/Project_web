<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Order Status</title>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen pb-28 font-sans text-gray-800">

    <div class="bg-white rounded-b-[2rem] shadow-sm pt-6 pb-8 px-6 relative mb-6">
        
        <button onclick="window.location.href='/menu'" class="absolute left-6 top-6 text-gray-400 hover:text-orange-500 flex items-center gap-1 font-bold transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            กลับ
        </button>

        <h1 class="text-3xl font-black text-center text-[#1e293b] mt-1">Your Orders</h1>
        
        <div class="flex justify-center gap-6 mt-4 text-sm font-bold text-black">
            <div class="flex items-center gap-2"><span class="w-3.5 h-3.5 rounded-full bg-yellow-400 shadow-sm"></span> Pending</div>
            <div class="flex items-center gap-2"><span class="w-3.5 h-3.5 rounded-full bg-blue-500 shadow-sm"></span> Cooking</div>
            <div class="flex items-center gap-2"><span class="w-3.5 h-3.5 rounded-full bg-green-500 shadow-sm"></span> Served</div>
        </div>
    </div>

    <div class="w-full max-w-2xl mx-auto px-6 space-y-4" id="order-container">
        </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 p-5 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] z-50">
        <div class="w-full max-w-2xl mx-auto">
            <div class="flex justify-between items-end mb-4 px-2">
                <span class="text-gray-500 font-bold text-lg">ยอดรวมทั้งหมด:</span>
                <span class="text-[#ea580c] font-black text-3xl" id="total-amount-display">0฿</span>
            </div>
            
            <button onclick="goToPayment()" class="w-full bg-[#ea580c] hover:bg-orange-700 text-white font-bold py-4 rounded-xl text-xl shadow-lg shadow-orange-500/30 transition-all active:scale-[0.98]">
                ชำระเงิน (Check Bill)
            </button>
        </div>
    </div>

    <script>
        const customerId = localStorage.getItem('customerId');
        let currentTotal = 0; 
        let currentOrderId = 0; 
        let canPay = false; 

        async function loadOrderData() {
            if (!customerId) return;

            try {
                const resStatus = await fetch(`/customer/status/${customerId}`);
                const statusData = await resStatus.json();
                
                const container = document.getElementById('order-container');
                container.innerHTML = ''; 
                
                let sum = 0; 
                let allServed = true; 
                let hasItem = false;

                statusData.forEach(item => {
                    hasItem = true;
                    
                    // 💡 แก้ไขสูตรคำนวณ: เอา (ราคาหลัก + ราคาพิเศษ) x จำนวน
                    const itemPrice = Number(item.price || 0);
                    const extraPrice = Number(item.extra_price || 0);
                    const qty = Number(item.quantity || 1);
                    
                    sum += ((itemPrice + extraPrice) * qty);

                    if (item.order_status === 'pending' || item.order_status === 'cooking') {
                        allServed = false;
                    }

                    let borderColor = 'border-yellow-400';
                    let textColor = 'text-yellow-500';
                    let statusText = 'Pending';

                    if (item.order_status === 'cooking') {
                        borderColor = 'border-blue-500';
                        textColor = 'text-blue-500';
                        statusText = 'Cooking';
                    } else if (item.order_status === 'served') {
                        borderColor = 'border-green-500';
                        textColor = 'text-green-500';
                        statusText = 'Served';
                    }

                    // 💡 เพิ่มการแสดงผลว่ามีการสั่งพิเศษ
                    let noteDisplay = item.detail || '-';
                    if (item.extra && item.extra.trim() !== '') {
                        noteDisplay += ` <span class="text-orange-500 font-bold ml-1">| ${item.extra} (+${extraPrice}฿)</span>`;
                    }

                    container.innerHTML += `
                        <div class="bg-white rounded-2xl p-5 flex justify-between items-center shadow-sm border-l-[6px] ${borderColor}">
                            <div>
                                <h3 class="font-bold text-xl text-gray-800">${item.name}</h3>
                                <p class="text-gray-400 text-sm mt-1">Note: ${noteDisplay}</p>
                            </div>
                            <div class="text-right">
                                <div class="${textColor} text-xs font-black tracking-widest uppercase mb-1">${statusText}</div>
                                <div class="text-orange-500 font-black text-2xl">x${qty}</div>
                            </div>
                        </div>
                    `;
                });

                currentTotal = sum;
                document.getElementById('total-amount-display').innerText = currentTotal + '฿';
                canPay = (hasItem && allServed);

                const resHistory = await fetch(`/customer/history/${customerId}`);
                const historyData = await resHistory.json();
                if (historyData.length > 0) {
                    currentOrderId = historyData[0].order_id;
                }

            } catch (error) {
                console.error("Error loading status:", error);
            }
        }

        loadOrderData();
        setInterval(loadOrderData, 3000);

        function goToPayment() {
            if(currentOrderId === 0 || currentTotal === 0) {
                Swal.fire('ไม่มีรายการ', 'ไม่พบรายการอาหารที่ต้องชำระเงิน', 'warning');
                return;
            }

            if(!canPay) {
                Swal.fire({
                    icon: 'warning',
                    title: 'รออาหารสักครู่นะครับ',
                    text: 'ต้องรอให้พ่อครัวทำอาหารและเสิร์ฟให้ครบทุกจานก่อน ถึงจะเช็คบิลได้ครับ 👨‍🍳',
                    confirmButtonColor: '#ea580c'
                });
                return;
            }

            window.location.href = `/customer/payment?total=${currentTotal}&id=${currentOrderId}`;
        }
    </script>
</body>
</html>
